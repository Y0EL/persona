<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="vermillionGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#E2401C"/>
      <stop offset="1" stop-color="#FF6B3D"/>
    </linearGradient>
    <radialGradient id="atmGrad" cx="20%" cy="20%" r="80%">
      <stop offset="0" stop-color="#1A1714"/>
      <stop offset="1" stop-color="#0E0D0B"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.93  0 0 0 0 0.91  0 0 0 0 0.85  0 0 0 0.045 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1400" height="480" fill="url(#atmGrad)"/>
  <rect width="1400" height="480" fill="url(#grain)" opacity="0.7"/>

  <!-- decorative atmospheric blobs -->
  <ellipse cx="180" cy="120" rx="220" ry="110" fill="#E2401C" opacity="0.06"/>
  <ellipse cx="1200" cy="380" rx="240" ry="120" fill="#3AAE7A" opacity="0.04"/>

  <!-- top masthead row with hairlines -->
  <line x1="80" y1="58" x2="1320" y2="58" stroke="#7B7466" stroke-width="0.6" opacity="0.4"/>
  <text x="80" y="44" font-family="Times New Roman, Times, serif" font-size="13" letter-spacing="4" fill="#E2401C">
    DISPATCH
  </text>
  <text x="240" y="44" font-family="Times New Roman, Times, serif" font-size="13" letter-spacing="4" fill="#C4B7A1">
    N° 001
  </text>
  <text x="700" y="44" text-anchor="middle" font-family="Times New Roman, Times, serif" font-style="italic" font-size="13" letter-spacing="2" fill="#C4B7A1">
    a working brief, dispatched continuously
  </text>
  <text x="1320" y="44" text-anchor="end" font-family="Times New Roman, Times, serif" font-size="13" letter-spacing="4" fill="#C4B7A1">
    MAY 2026 · JAKARTA 6°S
  </text>

  <!-- left meta column -->
  <text x="80" y="170" font-family="Times New Roman, Times, serif" font-size="12" letter-spacing="3" fill="#7B7466">
    AN AUTONOMOUS
  </text>
  <text x="80" y="190" font-family="Times New Roman, Times, serif" font-size="12" letter-spacing="3" fill="#7B7466">
    APPLICANT, FILED FOR
  </text>
  <text x="80" y="220" font-family="Times New Roman, Times, serif" font-style="italic" font-size="28" fill="#EDE7DA">
    Yoel Andreas
  </text>
  <text x="80" y="255" font-family="Times New Roman, Times, serif" font-style="italic" font-size="28" fill="#EDE7DA">
    Manoppo
  </text>
  <line x1="80" y1="280" x2="200" y2="280" stroke="#E2401C" stroke-width="1.2"/>
  <text x="80" y="306" font-family="Times New Roman, Times, serif" font-size="11" letter-spacing="3" fill="#C4B7A1">
    AI FORWARD
  </text>
  <text x="80" y="324" font-family="Times New Roman, Times, serif" font-size="11" letter-spacing="3" fill="#C4B7A1">
    DEPLOYED ENGINEER
  </text>

  <!-- vertical hairline divider -->
  <line x1="320" y1="100" x2="320" y2="380" stroke="#7B7466" stroke-width="0.5" opacity="0.3"/>

  <!-- main wordmark - massive Times Roman -->
  <text x="780" y="240" text-anchor="middle"
        font-family="Times New Roman, Times, serif"
        font-size="180" font-weight="400" fill="#EDE7DA"
        letter-spacing="-4">
    Persona
  </text>

  <!-- italic vermillion subtitle - the work line -->
  <text x="780" y="316" text-anchor="middle"
        font-family="Times New Roman, Times, serif"
        font-style="italic" font-size="48"
        fill="url(#vermillionGrad)"
        letter-spacing="0">
    the application is the work.
  </text>

  <!-- small kicker below -->
  <text x="780" y="358" text-anchor="middle"
        font-family="Times New Roman, Times, serif"
        font-size="13" letter-spacing="6" fill="#7B7466">
    A MAGAZINE OF AUTONOMOUS WORK · JAKARTA · 2026
  </text>

  <!-- right side stamp -->
  <g transform="translate(1240, 180) rotate(8)">
    <rect x="-58" y="-22" width="116" height="44" rx="6" fill="none" stroke="#E2401C" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="-3" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="9" letter-spacing="3" fill="#E2401C">
      VOL. ONE
    </text>
    <text x="0" y="13" text-anchor="middle" font-family="Times New Roman, Times, serif" font-style="italic" font-size="11" fill="#E2401C">
      printed continuously
    </text>
  </g>

  <!-- bottom hairline + colophon -->
  <line x1="80" y1="420" x2="1320" y2="420" stroke="#7B7466" stroke-width="0.6" opacity="0.4"/>
  <text x="80" y="446" font-family="Times New Roman, Times, serif" font-size="11" letter-spacing="3" fill="#7B7466">
    SET IN TIMES NEW ROMAN
  </text>
  <text x="700" y="446" text-anchor="middle" font-family="Times New Roman, Times, serif" font-style="italic" font-size="13" fill="#C4B7A1">
    glints  ·  jobstreet  ·  linkedin  ·  indeed
  </text>
  <text x="1320" y="446" text-anchor="end" font-family="Times New Roman, Times, serif" font-size="11" letter-spacing="3" fill="#7B7466">
    © Yoel
  </text>

  <!-- crop marks -->
  <g stroke="#7B7466" stroke-width="1" opacity="0.5">
    <line x1="60" y1="20" x2="80" y2="20"/>
    <line x1="20" y1="60" x2="20" y2="80"/>
    <line x1="1340" y1="20" x2="1320" y2="20"/>
    <line x1="1380" y1="60" x2="1380" y2="80"/>
    <line x1="60" y1="460" x2="80" y2="460"/>
    <line x1="20" y1="400" x2="20" y2="420"/>
    <line x1="1340" y1="460" x2="1320" y2="460"/>
    <line x1="1380" y1="400" x2="1380" y2="420"/>
  </g>
</svg>
